app:
  name: altura-api
  env: staging
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  shutdown_timeout: 30s

database:
  host: ${DB_HOST}
  port: 5432
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  name: altura_staging
  sslmode: require
  max_open_conns: 20
  max_idle_conns: 5
  conn_max_lifetime: 5m
  conn_max_idle_time: 1m
  connect_timeout: 10s

cache:
  host: ${REDIS_HOST}
  port: 6379
  password: ${REDIS_PASSWORD}
  db: 0
  pool_size: 10
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s

logger:
  level: info
