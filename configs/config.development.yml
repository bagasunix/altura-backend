app:
  name: altura-api
  env: development
  port: 8081
  read_timeout: 10s
  write_timeout: 10s
  shutdown_timeout: 30s

database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  name: altura_dev
  sslmode: disable
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 5m
  conn_max_idle_time: 1m
  connect_timeout: 10s

cache:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 5
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s

logger:
  level: debug
  development: true
